<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原型导航</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }
        .link-item {
            display: block;
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            color: #1890ff;
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .link-item:hover {
            background: #1890ff;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(24,144,255,0.3);
        }
    </style>
</head>
<body>
    <h1>原型导航</h1>
    <div class="link-list">
        <a href="customer-sidebar.html" class="link-item">客户侧边栏</a>
        <a href="user-profile.html" class="link-item">用户画像</a>
    </div>
</body>
</html>
